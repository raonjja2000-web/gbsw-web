<!--html input 통해 n 입력받기-->
<!--1~n까지의 누적합을 반복문 이용해 계산-->
<!-- 누적합을 문서에 출력-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>누적합</title>
</head>
<body>
    <h2>누적합 구하기</h2>
    <input
    id="input_number"
    type="number"
    placeholder="정수를 입력하세요"
    />
    <button id="btn" type="button">완료</button>
    <div id="result"></div>
</body>
</html>
<script>
    //  버튼에Click이벤트 등록
    document.getElementById("btn").onclick=function() {
        //input 내 값 조회
        const num=document.getElementById("input_number").value;
        
        let result= 0;
        //TODO::wlrwjq 1~N 까지의 누적합을 구하는 반복문을 작성해봅시다.
            // result안에 값을 누적시켜나간다.
        //1~num까지 총합
        for(let i=1; i <= num; i++) {
            result += i;
        }

        //result라는 id를 가진 div 태그 내용을 result로 변경
        document.getElementById("result").textContent=result;
    };
</script>
